<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Job Tracker</title>

  <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>

<body class="bg-base-200">

  <main class="max-w-5xl mx-auto p-5">

    <h1 class="text-3xl font-bold text-center mb-6">
      Job Application Tracker
    </h1>

    <!-- Dashboard -->
    <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6">
      <div class="card bg-base-100 p-4">
        <p>Total</p>
        <h2 id="total">0</h2>
      </div>

      <div class="card bg-base-100 p-4">
        <p>Interview</p>
        <h2 id="interview-count">0</h2>
      </div>

      <div class="card bg-base-100 p-4">
        <p>Rejected</p>
        <h2 id="rejected-count">0</h2>
      </div>
    </div>

    <!-- Jobs Section -->
    <div class="card bg-base-100 p-5">

      <div class="flex justify-between mb-4">
        <h2 class="font-bold">Available Jobs</h2>
        <span id="job-count">0 jobs</span>
      </div>

      <!-- Tabs -->
      <div class="flex gap-2 mb-5">
        <button class="btn btn-sm btn-primary" onclick="showTab('All')">All</button>
        <button class="btn btn-sm" onclick="showTab('Interview')">Interview</button>
        <button class="btn btn-sm" onclick="showTab('Rejected')">Rejected</button>
      </div>

      <!-- Jobs -->
      <div id="job-container" class="space-y-4"></div>

    </div>

  </main>

<script src="./js/data.js"></script>
<script src="./js/script.js"></script>
</body>
</html>
